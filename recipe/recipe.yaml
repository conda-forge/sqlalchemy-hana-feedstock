schema_version: 1

context:
  name: sqlalchemy-hana
  version: "4.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: de4e73b571140147eaa3660754f6f108199a68b975f096eb0dfddec6ef63b9a3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - sqlalchemy >=2,<3

tests:
  - python:
      imports:
        - sqlalchemy_hana
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: SQLAlchemy dialect for SAP HANA
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/SAP/sqlalchemy-hana/

extra:
  recipe-maintainers:
    - swenger
    - janjagusch
